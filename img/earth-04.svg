<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1614"/>
      <stop offset="100%" stop-color="#2e2620"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2830"/>
      <stop offset="100%" stop-color="#0e1618"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8943a"/>
      <stop offset="100%" stop-color="#9a7028"/>
    </linearGradient>
    <filter id="glow4"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow5"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <!-- Dark ambient room -->
  <rect width="800" height="520" fill="url(#bg4)"/>

  <!-- Desk surface (warm wood, dark) -->
  <path d="M0,360 Q400,340 800,360 L800,520 L0,520 Z" fill="#2a2018"/>
  <path d="M0,360 Q400,342 800,360" stroke="#3a3028" stroke-width="1.5" fill="none"/>

  <!-- Monitor stand -->
  <rect x="355" y="310" width="90" height="55" rx="4" fill="#1e1c18"/>
  <rect x="330" y="358" width="140" height="12" rx="4" fill="#252218"/>

  <!-- Monitor frame -->
  <rect x="160" y="90" width="480" height="295" rx="12" fill="#1a1814" filter="url(#glow4)"/>
  <rect x="168" y="98"  width="464" height="279" rx="8" fill="url(#screen)"/>

  <!-- Screen content: code editor vibe -->
  <!-- Line numbers -->
  <g fill="#4a4038" font-family="monospace" font-size="11" opacity="0.8">
    <text x="185" y="125">01</text>
    <text x="185" y="143">02</text>
    <text x="185" y="161">03</text>
    <text x="185" y="179">04</text>
    <text x="185" y="197">05</text>
    <text x="185" y="215">06</text>
    <text x="185" y="233">07</text>
    <text x="185" y="251">08</text>
    <text x="185" y="269">09</text>
    <text x="185" y="287">10</text>
    <text x="185" y="305">11</text>
    <text x="185" y="323">12</text>
    <text x="185" y="341">13</text>
  </g>
  <!-- Vertical divider -->
  <line x1="210" y1="102" x2="210" y2="372" stroke="#2e2c28" stroke-width="1"/>

  <!-- Code lines (amber accent = active, muted = rest) -->
  <g opacity="0.85">
    <!-- amber/gold highlight line -->
    <rect x="211" y="113" width="400" height="16" rx="2" fill="#b87828" opacity="0.12"/>
    <!-- keyword tokens -->
    <rect x="218" y="116" width="38" height="10" rx="2" fill="#c89040" opacity="0.9"/>
    <rect x="264" y="116" width="22" height="10" rx="2" fill="#8ab0d0" opacity="0.7"/>
    <rect x="294" y="116" width="55" height="10" rx="2" fill="#e8e0d0" opacity="0.55"/>
    <rect x="357" y="116" width="18" height="10" rx="2" fill="#c89040" opacity="0.7"/>
    <rect x="383" y="116" width="70" height="10" rx="2" fill="#9ac080" opacity="0.65"/>

    <rect x="226" y="134" width="45" height="10" rx="2" fill="#8ab0d0" opacity="0.6"/>
    <rect x="279" y="134" width="35" height="10" rx="2" fill="#e8e0d0" opacity="0.4"/>
    <rect x="322" y="134" width="28" height="10" rx="2" fill="#c89040" opacity="0.55"/>
    <rect x="358" y="134" width="80" height="10" rx="2" fill="#e8e0d0" opacity="0.35"/>

    <rect x="226" y="152" width="30" height="10" rx="2" fill="#c89040" opacity="0.6"/>
    <rect x="264" y="152" width="55" height="10" rx="2" fill="#9ac080" opacity="0.55"/>
    <rect x="327" y="152" width="40" height="10" rx="2" fill="#e8e0d0" opacity="0.35"/>
    <rect x="375" y="152" width="60" height="10" rx="2" fill="#8ab0d0" opacity="0.45"/>

    <rect x="218" y="170" width="25" height="10" rx="2" fill="#c89040" opacity="0.7"/>
    <rect x="251" y="170" width="90" height="10" rx="2" fill="#e8e0d0" opacity="0.3"/>
    <rect x="349" y="170" width="50" height="10" rx="2" fill="#9ac080" opacity="0.4"/>

    <rect x="226" y="188" width="60" height="10" rx="2" fill="#8ab0d0" opacity="0.5"/>
    <rect x="294" y="188" width="30" height="10" rx="2" fill="#e8e0d0" opacity="0.35"/>

    <rect x="218" y="206" width="35" height="10" rx="2" fill="#c07080" opacity="0.55"/>
    <rect x="261" y="206" width="55" height="10" rx="2" fill="#e8e0d0" opacity="0.3"/>
    <rect x="324" y="206" width="45" height="10" rx="2" fill="#9ac080" opacity="0.45"/>
    <rect x="377" y="206" width="70" height="10" rx="2" fill="#e8e0d0" opacity="0.25"/>

    <rect x="226" y="224" width="42" height="10" rx="2" fill="#8ab0d0" opacity="0.5"/>
    <rect x="276" y="224" width="60" height="10" rx="2" fill="#e8e0d0" opacity="0.3"/>

    <!-- cursor blink suggestion -->
    <rect x="218" y="242" width="2"  height="13" rx="1" fill="#c89040" opacity="0.9"/>

    <rect x="218" y="260" width="50" height="10" rx="2" fill="#9ac080" opacity="0.35"/>
    <rect x="276" y="260" width="30" height="10" rx="2" fill="#c89040" opacity="0.4"/>
    <rect x="314" y="260" width="85" height="10" rx="2" fill="#e8e0d0" opacity="0.25"/>

    <rect x="218" y="278" width="70" height="10" rx="2" fill="#8ab0d0" opacity="0.35"/>
    <rect x="296" y="278" width="45" height="10" rx="2" fill="#e8e0d0" opacity="0.25"/>

    <rect x="218" y="296" width="25" height="10" rx="2" fill="#c89040" opacity="0.5"/>
    <rect x="251" y="296" width="110" height="10" rx="2" fill="#e8e0d0" opacity="0.2"/>

    <rect x="218" y="314" width="55" height="10" rx="2" fill="#9ac080" opacity="0.35"/>

    <rect x="218" y="332" width="18" height="10" rx="2" fill="#c89040" opacity="0.55"/>
  </g>

  <!-- Screen ambient glow on desk -->
  <ellipse cx="400" cy="365" rx="220" ry="30" fill="#2a4060" opacity="0.2" filter="url(#glow5)"/>

  <!-- Keyboard (dark, minimal) -->
  <rect x="230" y="375" width="340" height="55" rx="6" fill="#201e1a"/>
  <rect x="234" y="378" width="332" height="49" rx="4" fill="#252220"/>
  <!-- key rows suggestion -->
  <g fill="#302e28" rx="3">
    <rect x="242" y="383" width="24" height="12" rx="2"/>
    <rect x="271" y="383" width="24" height="12" rx="2"/>
    <rect x="300" y="383" width="24" height="12" rx="2"/>
    <rect x="329" y="383" width="24" height="12" rx="2"/>
    <rect x="358" y="383" width="24" height="12" rx="2"/>
    <rect x="387" y="383" width="24" height="12" rx="2"/>
    <rect x="416" y="383" width="24" height="12" rx="2"/>
    <rect x="445" y="383" width="24" height="12" rx="2"/>
    <rect x="474" y="383" width="50" height="12" rx="2"/>

    <rect x="248" y="400" width="28" height="12" rx="2"/>
    <rect x="281" y="400" width="24" height="12" rx="2"/>
    <rect x="310" y="400" width="24" height="12" rx="2"/>
    <rect x="339" y="400" width="24" height="12" rx="2"/>
    <rect x="368" y="400" width="24" height="12" rx="2"/>
    <rect x="397" y="400" width="24" height="12" rx="2"/>
    <rect x="426" y="400" width="24" height="12" rx="2"/>
    <rect x="455" y="400" width="36" height="12" rx="2"/>

    <rect x="258" y="417" width="140" height="12" rx="2"/>
    <rect x="403" y="417" width="140" height="12" rx="2"/>
  </g>

  <!-- Ambient warm lamp glow (off-screen upper right) -->
  <ellipse cx="760" cy="60" rx="100" ry="80" fill="#c87828" opacity="0.08" filter="url(#glow5)"/>

  <!-- Coffee mug (terracotta, dark) -->
  <ellipse cx="620" cy="358" rx="24" ry="9" fill="#7a4830"/>
  <path d="M596,358 Q596,400 620,404 Q644,400 644,358 Z" fill="#8a5538"/>
  <path d="M644,368 Q662,368 662,382 Q662,396 644,396" stroke="#7a4830" stroke-width="4" fill="none" stroke-linecap="round"/>
  <ellipse cx="620" cy="358" rx="22" ry="7" fill="#1a1210"/>
</svg>
