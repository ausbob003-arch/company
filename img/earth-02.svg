<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d6cfc4"/>
      <stop offset="60%" stop-color="#c4b89a"/>
      <stop offset="100%" stop-color="#a09070"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b0a090"/>
      <stop offset="100%" stop-color="#7a6e5e"/>
    </linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="2.5"/></filter>
    <filter id="softer"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>

  <!-- Background wash -->
  <rect width="800" height="520" fill="url(#bg2)"/>

  <!-- Soft fog layer -->
  <rect width="800" height="200" y="0" fill="#e0d8cc" opacity="0.35"/>

  <!-- Abstract forest silhouette (sage/olive tones) -->
  <g opacity="0.55">
    <ellipse cx="60"  cy="300" rx="55" ry="90" fill="#7a8c6a"/>
    <ellipse cx="130" cy="280" rx="48" ry="100" fill="#6e7e5c"/>
    <ellipse cx="195" cy="295" rx="52" ry="85" fill="#7a8c6a"/>
    <ellipse cx="260" cy="275" rx="44" ry="105" fill="#687858"/>
    <ellipse cx="320" cy="290" rx="50" ry="88" fill="#738060"/>
    <rect x="40"  y="340" width="14" height="180" fill="#5a4e38"/>
    <rect x="110" y="330" width="16" height="190" fill="#5a4e38"/>
    <rect x="175" y="340" width="14" height="180" fill="#5a4e38"/>
    <rect x="238" y="325" width="16" height="195" fill="#5a4e38"/>
    <rect x="298" y="335" width="14" height="185" fill="#5a4e38"/>
  </g>

  <!-- Mid ground (warmer) -->
  <path d="M280,320 Q400,290 520,315 Q640,340 800,310 L800,520 L280,520 Z" fill="#9a8a6a" opacity="0.75"/>
  <path d="M0,370 Q120,345 260,370 L260,520 L0,520 Z" fill="#9a8a6a" opacity="0.75"/>

  <!-- Foreground earth -->
  <path d="M0,420 Q200,400 400,420 Q600,440 800,415 L800,520 L0,520 Z" fill="#7a6448"/>

  <!-- Stone cluster center -->
  <ellipse cx="420" cy="430" rx="70" ry="28" fill="#9a8a78" opacity="0.9"/>
  <ellipse cx="415" cy="422" rx="55" ry="22" fill="#b0a090"/>
  <ellipse cx="440" cy="436" rx="38" ry="16" fill="#8a7a68"/>
  <!-- moss/lichen on stone -->
  <ellipse cx="400" cy="418" rx="18" ry="6" fill="#8a9870" opacity="0.6"/>
  <ellipse cx="430" cy="416" rx="12" ry="4" fill="#7a8860" opacity="0.5"/>

  <!-- Path / trail suggestion -->
  <path d="M340,520 Q380,460 410,420 Q430,400 450,390" stroke="#c0a880" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.35"/>

  <!-- Warm light ray -->
  <path d="M650,0 L800,120 L800,0 Z" fill="#e8d090" opacity="0.12"/>
  <ellipse cx="720" cy="80" rx="120" ry="60" fill="#e0c870" opacity="0.18" filter="url(#softer)"/>

  <!-- Floating dust particles -->
  <circle cx="310" cy="240" r="2.5" fill="#e0d0b0" opacity="0.5"/>
  <circle cx="450" cy="200" r="1.8" fill="#e0d0b0" opacity="0.4"/>
  <circle cx="560" cy="260" r="2.2" fill="#e0d0b0" opacity="0.45"/>
  <circle cx="200" cy="280" r="1.5" fill="#e0d0b0" opacity="0.35"/>
</svg>
