<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#e8e0d4"/>
      <stop offset="100%" stop-color="#c8b898"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b89a70"/>
      <stop offset="100%" stop-color="#8a7050"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0.1" y2="1">
      <stop offset="0%" stop-color="#f4efe8"/>
      <stop offset="100%" stop-color="#e8e0d0"/>
    </linearGradient>
    <filter id="shadow3"><feDropShadow dx="3" dy="4" stdDeviation="6" flood-color="#5a4a38" flood-opacity="0.25"/></filter>
    <filter id="shadow4"><feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#5a4a38" flood-opacity="0.18"/></filter>
  </defs>

  <!-- Room background -->
  <rect width="800" height="520" fill="url(#bg3)"/>

  <!-- Wall panel line -->
  <rect x="0" y="0" width="800" height="310" fill="#ddd4c4" opacity="0.5"/>
  <line x1="0" y1="310" x2="800" y2="310" stroke="#c0b098" stroke-width="1.5"/>

  <!-- Window light -->
  <rect x="560" y="40" width="180" height="240" rx="4" fill="#e8d8b8" opacity="0.4"/>
  <rect x="560" y="40" width="180" height="240" rx="4" stroke="#c8b898" stroke-width="2" fill="none"/>
  <line x1="650" y1="40" x2="650" y2="280" stroke="#c8b898" stroke-width="1.5"/>
  <line x1="560" y1="160" x2="740" y2="160" stroke="#c8b898" stroke-width="1.5"/>
  <!-- warm light from window -->
  <path d="M560,40 L380,310 L560,310 Z" fill="#e8d090" opacity="0.1"/>
  <path d="M740,40 L800,110 L800,310 L620,310 Z" fill="#e8d090" opacity="0.08"/>

  <!-- Desk surface -->
  <rect x="80" y="310" width="640" height="70" rx="4" fill="url(#desk)" filter="url(#shadow3)"/>
  <rect x="80" y="310" width="640" height="8" rx="2" fill="#c8a878"/>

  <!-- Notebook / paper -->
  <rect x="140" y="248" width="200" height="155" rx="6" fill="url(#paper)" transform="rotate(-3,240,325)" filter="url(#shadow4)"/>
  <rect x="143" y="252" width="194" height="149" rx="4" fill="none" stroke="#d8cfc0" stroke-width="1" transform="rotate(-3,240,325)"/>
  <!-- ruled lines -->
  <g transform="rotate(-3,240,325)" stroke="#d0c8b8" stroke-width="0.8" opacity="0.7">
    <line x1="155" y1="278" x2="328" y2="278"/>
    <line x1="155" y1="292" x2="328" y2="292"/>
    <line x1="155" y1="306" x2="328" y2="306"/>
    <line x1="155" y1="320" x2="328" y2="320"/>
    <line x1="155" y1="334" x2="328" y2="334"/>
    <line x1="155" y1="348" x2="328" y2="348"/>
    <line x1="155" y1="362" x2="328" y2="362"/>
  </g>
  <!-- pencil marks suggestion -->
  <g transform="rotate(-3,240,325)" stroke="#a09080" stroke-width="1.2" opacity="0.4" stroke-linecap="round">
    <line x1="158" y1="278" x2="240" y2="278"/>
    <line x1="158" y1="292" x2="290" y2="292"/>
    <line x1="158" y1="306" x2="210" y2="306"/>
  </g>

  <!-- Coffee cup (terracotta) -->
  <ellipse cx="420" cy="308" rx="32" ry="12" fill="#c06040" opacity="0.9"/>
  <path d="M388,308 Q388,358 420,362 Q452,358 452,308 Z" fill="#d07050"/>
  <path d="M388,310 Q388,360 420,364 Q452,360 452,310" fill="none" stroke="#b05030" stroke-width="1.5"/>
  <!-- handle -->
  <path d="M452,322 Q475,322 475,338 Q475,354 452,354" stroke="#c06040" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- coffee surface -->
  <ellipse cx="420" cy="308" rx="30" ry="10" fill="#3a2818"/>
  <!-- steam -->
  <path d="M410,295 Q414,282 410,270" stroke="#d0c0a8" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M420,292 Q424,278 420,265" stroke="#d0c0a8" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M430,294 Q434,280 430,268" stroke="#d0c0a8" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.45"/>

  <!-- Small plant (succulent) -->
  <ellipse cx="590" cy="308" rx="22" ry="10" fill="#8a6840"/>
  <path d="M568,308 Q568,340 590,344 Q612,340 612,308 Z" fill="#9a7848"/>
  <!-- leaves -->
  <ellipse cx="590" cy="295" rx="14" ry="22" fill="#7a9060" transform="rotate(-15,590,295)"/>
  <ellipse cx="590" cy="295" rx="12" ry="20" fill="#8aa070" transform="rotate(10,590,295)"/>
  <ellipse cx="590" cy="288" rx="10" ry="16" fill="#6a8050" transform="rotate(-5,590,288)"/>
  <ellipse cx="590" cy="282" rx="7"  ry="12" fill="#7a9060"/>

  <!-- Pencil -->
  <rect x="480" y="358" width="120" height="8" rx="4" fill="#e8c850" transform="rotate(-8,540,362)"/>
  <polygon points="600,354 608,362 600,370" fill="#e8a878" transform="rotate(-8,540,362)"/>
  <rect x="480" y="358" width="16" height="8" rx="2" fill="#d0a888" transform="rotate(-8,540,362)"/>

  <!-- Desk legs suggestion -->
  <rect x="100" y="375" width="18" height="145" rx="4" fill="#7a6040"/>
  <rect x="680" y="375" width="18" height="145" rx="4" fill="#7a6040"/>
</svg>
